name: Test Telegem

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Ruby ${{ matrix.ruby-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        ruby-version: ['3.1', '3.2', '3.3', '3.4', '3.5']
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
    
    - name: Install dependencies
      run: |
        gem install rspec
        gem install rack-test
        # Install telegem dependencies from gemspec
        gem build telegem.gemspec
        gem install *.gem
    
    - name: Run all tests
      run: |
        ruby -r rspec -e 'RSpec::Core::Runner.run(["test/spec.rb", "test/webhook_spec.rb"])'
